name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: dytallix

jobs:
  build-release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: dytallix-x86_64-unknown-linux-gnu.tar.gz
            artifact_name: dytallix-x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/dytallix
          - os: macos-13
            target: x86_64-apple-darwin
            archive_name: dytallix-x86_64-apple-darwin.tar.gz
            artifact_name: dytallix-x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/dytallix
          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: dytallix-aarch64-apple-darwin.tar.gz
            artifact_name: dytallix-aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/dytallix
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: dytallix-x86_64-pc-windows-msvc.zip
            artifact_name: dytallix-x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/dytallix.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          staging="${{ matrix.artifact_name }}"
          mkdir -p "$staging"
          cp "${{ matrix.binary_path }}" "$staging/$BIN_NAME"
          cp README.md LICENSE "$staging/"
          tar -czf "dist/${{ matrix.archive_name }}" "$staging"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $staging = "${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "$staging\\${env:BIN_NAME}.exe"
          Copy-Item README.md, LICENSE $staging
          Compress-Archive -Path "$staging\\*" -DestinationPath "dist\\${{ matrix.archive_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive_name }}
          fail_on_unmatched_files: true
